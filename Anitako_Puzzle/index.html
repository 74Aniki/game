<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兄貴のたこ焼き パズルゲーム</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
            font-family: 'M PLUS Rounded 1c', sans-serif; 
            background-image: url('aka_haikei.png');
            background-size: 400px;
            animation: bg-scroll 15s linear infinite;
            user-select: none;
        }

        @keyframes bg-scroll { 0% { background-position: 0 0; } 100% { background-position: 400px 400px; } }

        #main-wrapper { display: flex; align-items: flex-end; gap: 30px; z-index: 10; margin-top: 30px; }
        #center-column { display: flex; flex-direction: column; align-items: center; gap: 15px; }

        .character-container { display: flex; flex-direction: column; align-items: center; position: relative; padding-bottom: 20px; }
        .speech-bubble {
            background: #fff; border-radius: 20px; padding: 15px 20px; font-size: 20px; color: #d35400;
            border: 5px solid #e15f41; margin-bottom: 20px; text-align: center; width: 220px;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1); position: relative; white-space: pre-line; line-height: 1.4;
            min-height: 60px; display: flex; align-items: center; justify-content: center; z-index: 3; font-weight: bold;
        }
        .speech-bubble::after { content: ''; position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); border-width: 16px 16px 0; border-style: solid; border-color: #e15f41 transparent transparent transparent; }
        .speech-bubble::before { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: #fff transparent transparent transparent; z-index: 1; }

        .character { width: 250px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3)); z-index: 2; }
        .char-aniki { animation: float-aniki 2s ease-in-out infinite alternate; }
        @keyframes float-aniki { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }
        .char-tako { animation: float-tako 2s ease-in-out infinite alternate 0.5s; }
        @keyframes float-tako { 0% { transform: scaleX(-1) translateY(0); } 100% { transform: scaleX(-1) translateY(-15px); } }

        #tako-logo { width: 280px; position: absolute; top: -240px; animation: sway 2s ease-in-out infinite alternate; z-index: 4; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.2)); pointer-events: none; }
        @keyframes sway { 0% { transform: rotate(-8deg); } 100% { transform: rotate(8deg); } }

        /* ゲーム画面 */
        #game-container { 
            position: relative; background-color: #fff9e6; border-radius: 10px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 8px solid #8b4513; touch-action: none; 
            width: 400px; height: 550px; 
        }
        
        #game-container::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 80%; background-image: url('aniki_goldlogo.png'); background-size: contain; background-position: center; background-repeat: no-repeat; opacity: 0.15; pointer-events: none; z-index: 0;
        }

        #danger-line { position: absolute; top: 130px; left: 0; width: 100%; border-top: 3px dashed rgba(225, 95, 65, 0.6); z-index: 2; pointer-events: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        #player-piece-container { position: absolute; top: 40px; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 6; display: none; }
        
        #guide-line { 
            position: absolute; top: 50%; left: 50%; transform: translateX(-50%); width: 3px; height: 450px; 
            border-left: 3px dashed rgba(225, 95, 65, 0.8); z-index: -1; 
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
        }

        #timer-container { position: absolute; top: 10px; left: 10px; background: #fff; padding: 5px 15px; border-radius: 20px; border: 3px solid #3498db; box-shadow: 0 3px 0 #2980b9; color: #2980b9; font-size: 20px; font-weight: bold; transition: color 0.3s, border-color 0.3s; }
        
        #next-container { position: absolute; top: 10px; right: 10px; text-align: center; background: rgba(255,255,255,0.95); padding: 5px 10px; border-radius: 15px; border: 2px solid #e15f41; box-shadow: 0 2px 0 #e15f41; }
        #next-label { font-size: 13px; color: #e15f41; margin-bottom: 2px; font-weight: bold; }
        #next-preview { width: 40px; height: 40px; object-fit: contain; }
        #next-size { font-size: 11px; color: #d35400; font-weight: bold; margin-top: 3px; }

        #bottom-panel { display: none; width: 400px; justify-content: space-between; align-items: center; }
        
        #bottom-left-btns { display: flex; gap: 12px; }
        .circle-btn {
            background: #fff; border: 4px solid #e15f41; border-radius: 50%; width: 55px; height: 55px; cursor: pointer;
            box-shadow: 0 5px 0 #e15f41; display: flex; justify-content: center; align-items: center; transition: transform 0.1s, box-shadow 0.1s;
        }
        .circle-btn:active { transform: translateY(4px); box-shadow: none; }
        .icon-svg { width: 30px; height: 30px; stroke: #e15f41; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .icon-fill { fill: #e15f41; stroke: none; }

        /* スコアの2段表示用デザイン */
        #bottom-right-score { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.95); padding: 5px 15px; border-radius: 20px; border: 4px solid #e15f41; box-shadow: 0 5px 0 #e15f41; }
        #current-score-box { color: #e15f41; font-weight: bold; text-shadow: 1px 1px 0 #fad390; text-align: center; line-height: 1.1; }
        #current-score-box .label { font-size: 14px; }
        #current-score-box .value { font-size: 22px; }
        #stats-col { display: flex; flex-direction: column; font-size: 12px; color: #d35400; font-weight: bold; border-left: 2px dashed #f1c40f; padding-left: 10px; line-height: 1.3;}

        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,249,230,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; pointer-events: auto; }
        
        /* 巨大でポップな3段組タイトル＆アニメーション（マージンを減らして画面に収める） */
        .pop-title {
            color: #fff; -webkit-text-stroke: 3.5px #e15f41; paint-order: stroke fill;
            text-shadow: 0 8px 0 #c44536, 0 15px 20px rgba(0,0,0,0.3); 
            text-align: center; font-weight: 900; margin: 0 0 15px 0;
            animation: titleBounce 2s infinite alternate ease-in-out;
            line-height: 1.1;
        }
        @keyframes titleBounce {
            0% { transform: scale(0.95) rotate(-3deg); }
            100% { transform: scale(1.05) rotate(3deg); }
        }
        .pop-title .line1 { font-size: 32px; display: block; color: #f1c40f; -webkit-text-stroke: 2.5px #d35400; margin-bottom: -5px; letter-spacing: 2px;}
        .pop-title .line2 { font-size: 68px; display: block; letter-spacing: 3px; }
        .pop-title .line3 { font-size: 36px; display: block; color: #f1c40f; -webkit-text-stroke: 2.5px #d35400; margin-top: -5px; letter-spacing: 2px;}

        /* お顔ON/OFF選択ボタン（中央寄せとマージン調整） */
        .face-toggle-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .face-btn {
            background: #fff; color: #d35400; border: 3px solid #f1c40f; border-radius: 20px; padding: 8px 15px; 
            font-size: 16px; cursor: pointer; font-weight: bold; opacity: 0.6; transition: all 0.2s; box-shadow: 0 3px 0 #f1c40f;
        }
        .face-btn.active {
            background: #ffeaa7; color: #e15f41; border-color: #e15f41; opacity: 1; box-shadow: 0 4px 0 #e15f41; transform: translateY(-2px);
        }

        /* 画面に収まるよう、ボタンのサイズと余白を少し小さめに調整 */
        .action-btn { background: #fff; color: #e15f41; padding: 10px 22px; border-radius: 30px; font-size: 18px; border: 4px solid #e15f41; box-shadow: 0 4px 0 #e15f41; cursor: pointer; margin: 5px; font-family: 'M PLUS Rounded 1c', sans-serif; font-weight: bold; transition: transform 0.1s; }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .score-list { background: #fff; border: 4px solid #e15f41; border-radius: 20px; padding: 15px 30px; margin-bottom: 20px; width: 80%; text-align: center; }
        .score-list h3 { color: #333; margin: 10px 0 5px 0; font-size: 18px; border-bottom: 2px dashed #f1c40f; padding-bottom: 5px; }
        .score-list p { color: #e15f41; margin: 0 0 10px 0; font-size: 16px; font-weight: bold; }

        .tako-selector { display: flex; gap: 15px; margin: 5px 0 15px 0; }
        .tako-option { width: 65px; height: 65px; border-radius: 50%; border: 5px solid transparent; cursor: pointer; transition: all 0.2s; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tako-option.selected { border-color: #e15f41; background: #ffeaa7; transform: scale(1.1); box-shadow: 0 0 15px #e15f41; }
        .instruction { font-size: 16px; color: #d35400; font-weight: bold; text-align: center; margin-bottom: 5px; }

        .jumping-tako { position: absolute; width: 180px; height: 180px; pointer-events: none; z-index: 101; animation: jumpOut 2.5s ease-in-out forwards; }
        @keyframes jumpOut {
            0% { transform: translate(-50%, -50%) scale(0.5) rotate(0deg); opacity: 1; }
            15% { transform: translate(-50%, -50%) scale(1.3) rotate(-15deg); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1.1) rotate(15deg); opacity: 1; }
            45% { transform: translate(-50%, -50%) scale(1.3) rotate(-15deg); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1.2) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -800px) scale(2.0) rotate(360deg); opacity: 0; }
        }

        .floating-score { position: absolute; color: #ff9ff3; font-size: 42px; font-weight: bold; text-shadow: 3px 3px 0 #d35400, -3px -3px 0 #d35400, 3px -3px 0 #d35400, -3px 3px 0 #d35400; pointer-events: none; z-index: 102; animation: floatUp 2.5s ease-in-out forwards; }
        @keyframes floatUp { 
            0% { transform: translateX(-50%) translateY(0); opacity: 1; } 
            60% { transform: translateX(-50%) translateY(-60px); opacity: 1; }
            100% { transform: translateX(-50%) translateY(-200px); opacity: 0; } 
        }
        
        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 550px; z-index: 20; touch-action: none; cursor: grab; }
        #touch-layer:active { cursor: grabbing; }
        
        #pause-screen { background: rgba(0,0,0,0.6); display: none; }
    </style>
</head>
<body>

    <audio id="bgm" src="song_anitako.mp3" loop></audio>

    <div id="main-wrapper">
        <div class="character-container">
            <div class="speech-bubble" id="speech-aniki">気合入れて<br>たこ焼きつくるぞ！</div>
            <img src="aniki_kamae.png" alt="お兄さん" class="character char-aniki">
        </div>

        <div id="center-column">
            
            <div id="game-container">
                <canvas id="matter-canvas"></canvas>
                <div id="danger-line"></div>

                <div id="ui-layer">
                    <div id="timer-container" style="display:none;">
                        <span id="timer-val">3:00</span>
                    </div>

                    <div id="next-container" style="display:none;">
                        <div id="next-label">つぎ</div>
                        <img id="next-preview" src="" alt="次">
                        <div id="next-size">ふつう</div>
                    </div>

                    <div id="player-piece-container">
                        <div style="position: relative; width: 100%; height: 100%;">
                            <canvas id="player-face-canvas" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none;"></canvas>
                        </div>
                        <div id="guide-line"></div>
                    </div>
                </div>

                <div id="touch-layer" style="display:none;"></div>

                <div id="start-screen" class="overlay-screen">
                    <h1 class="pop-title">
                        <span class="line1">兄貴の</span>
                        <span class="line2">たこやき</span>
                        <span class="line3">パズルゲーム</span>
                    </h1>
                    
                    <div id="diff-select" style="text-align: center;">
                        <div class="instruction">たこやきのかお</div>
                        <div class="face-toggle-container">
                            <button id="btn-face-on" class="face-btn active" onclick="setFaceMode(true)">あり</button>
                            <button id="btn-face-off" class="face-btn" onclick="setFaceMode(false)">なし</button>
                        </div>

                        <div class="instruction">なんいど を えらんでね！</div>
                        <button class="action-btn" onclick="selectDiff(1)">かんたん（1しゅるい）</button><br>
                        <button class="action-btn" onclick="selectDiff(2)">ふつう（2しゅるい）</button><br>
                        <button class="action-btn" onclick="selectDiff(3)">むずい（3つぜんぶ）</button><br>
                        <button class="action-btn" style="margin-top: 10px; background: #f1c40f; border-color: #f39c12; color: #fff; box-shadow: 0 4px 0 #f39c12;" onclick="openScoreScreen()">🏆 売上きろく</button>
                    </div>
                    <div id="type-select" style="display:none;">
                        <div class="instruction" id="type-msg">たこやき を えらんでね！</div>
                        <div class="tako-selector">
                            <img src="2_takoyaki.png" class="tako-option" id="tako-opt-0" onclick="toggleTako(0)">
                            <img src="3_takoyaki.png" class="tako-option" id="tako-opt-1" onclick="toggleTako(1)">
                            <img src="4_takoyaki.png" class="tako-option" id="tako-opt-2" onclick="toggleTako(2)">
                        </div>
                        <button class="action-btn" id="start-btn" onclick="startGame()" disabled>スタート！</button>
                    </div>
                </div>

                <div id="score-screen" class="overlay-screen" style="display:none;">
                    <h1>売上きろく</h1>
                    <div class="score-list">
                        <h3>かんたん（1しゅるい）</h3>
                        <p>さいこう: <span id="record-high-1">0</span>円 / ぜんかい: <span id="record-prev-1">0</span>円</p>
                        <h3>ふつう（2しゅるい）</h3>
                        <p>さいこう: <span id="record-high-2">0</span>円 / ぜんかい: <span id="record-prev-2">0</span>円</p>
                        <h3>むずい（3つぜんぶ）</h3>
                        <p>さいこう: <span id="record-high-3">0</span>円 / ぜんかい: <span id="record-prev-3">0</span>円</p>
                    </div>
                    <button class="action-btn" onclick="closeScoreScreen()">もどる</button>
                </div>

                <div id="pause-screen" class="overlay-screen">
                    <h1 style="font-size: 40px;">休憩中...🍵</h1>
                    <button class="action-btn" onclick="togglePause()">ゲームにもどる</button>
                    <button class="action-btn" style="background: #bdc3c7; border-color: #95a5a6; color: #fff; box-shadow: 0 5px 0 #95a5a6;" onclick="backToTitle()">やめる</button>
                </div>

                <div id="game-over-screen" class="overlay-screen" style="display:none;">
                    <h1 id="msg-title">ゲームオーバー</h1>
                    <p style="font-size: 24px; color: #d35400; font-weight: bold; margin-bottom: 20px;">本日の売上: <span id="final-score" style="color: #e15f41; font-size: 32px;">0</span> 円</p>
                    <button class="action-btn" onclick="backToTitle()">タイトルへもどる</button>
                </div>
            </div>

            <div id="bottom-panel">
                <div id="bottom-left-btns">
                    <button id="mute-btn" class="circle-btn" onclick="toggleMute()">
                        <svg id="icon-sound-on" class="icon-svg" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                        <svg id="icon-sound-off" class="icon-svg" viewBox="0 0 24 24" style="display: none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="1" x2="1" y2="23"></line></svg>
                    </button>
                    <button id="pause-btn" class="circle-btn" onclick="togglePause()">
                        <svg class="icon-fill" viewBox="0 0 24 24" style="width:24px; height:24px;">
                            <rect x="6" y="5" width="4" height="14" rx="1"></rect>
                            <rect x="14" y="5" width="4" height="14" rx="1"></rect>
                        </svg>
                    </button>
                </div>

                <div id="bottom-right-score">
                    <div id="current-score-box">
                        <div class="label">売上</div>
                        <div class="value"><span id="score-val">0</span>円</div>
                    </div>
                    <div id="stats-col">
                        <div>さいこう: <span id="high-score-val">0</span>円</div>
                        <div>ぜんかい: <span id="prev-score-val">0</span>円</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="character-container">
            <img src="aniki_logo.png" id="tako-logo" alt="ロゴ">
            <div class="speech-bubble" id="speech-tako">タッチで<br>スタートだッチョ！</div>
            <img src="tako.png" alt="たこ" class="character char-tako">
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

        const width = 400;
        const height = 550; 
        const gameOverLine = 130;
        let engine, render, runner;
        let isGameOver = false;
        let isStarted = false;
        let isPaused = false;
        let score = 0;
        let gameOverTimer = 0;

        let canDrop = false;
        let isDragging = false;
        let playerX = width / 2;
        let currentPiece = null; 
        let nextPiece = null;    
        let playerEmotion = 'smile';
        
        let isFaceEnabled = true;

        const TOTAL_TIME = 180;
        let timeLeft = TOTAL_TIME;
        let countdownInterval;

        const takoImages = ['2_takoyaki.png', '3_takoyaki.png', '4_takoyaki.png'];
        const loadedImages = [];
        takoImages.forEach((src, i) => {
            loadedImages[i] = new Image();
            loadedImages[i].src = src;
        });
        const maxTakoImg = new Image();
        maxTakoImg.src = 'tako.png';

        const sizeLabels = ['ちいさめ', 'ふつう', 'おおきめ', 'とくだい', 'メガ', 'MAX'];
        let requiredSelections = 1;
        let selectedTypes = []; 

        const imageBaseSize = 400; 
        const sizes = [20, 30, 45, 65, 90, 120];

        let scores = {
            1: { high: localStorage.getItem('takopazu_high_1') || 0, prev: localStorage.getItem('takopazu_prev_1') || 0 },
            2: { high: localStorage.getItem('takopazu_high_2') || 0, prev: localStorage.getItem('takopazu_prev_2') || 0 },
            3: { high: localStorage.getItem('takopazu_high_3') || 0, prev: localStorage.getItem('takopazu_prev_3') || 0 }
        };

        function updateScoreDisplay() {
            for(let i=1; i<=3; i++) {
                document.getElementById(`record-high-${i}`).innerText = scores[i].high;
                document.getElementById(`record-prev-${i}`).innerText = scores[i].prev;
            }
        }
        updateScoreDisplay();

        let isMuted = false;
        function toggleMute() {
            playSound('click');
            const bgm = document.getElementById('bgm');
            isMuted = !isMuted;
            bgm.muted = isMuted;
            document.getElementById('icon-sound-on').style.display = isMuted ? 'none' : 'block';
            document.getElementById('icon-sound-off').style.display = isMuted ? 'block' : 'none';
        }

        function togglePause() {
            playSound('click');
            if (!isStarted || isGameOver) return;
            isPaused = !isPaused;
            if (isPaused) {
                Runner.stop(runner); 
                document.getElementById('pause-screen').style.display = 'flex';
                document.getElementById('speech-aniki').innerText = "ちょっと休憩だ！\nお茶でも飲むか？";
                document.getElementById('speech-tako').innerText = "休憩ッチョ〜🍵";
            } else {
                Runner.start(runner, engine); 
                document.getElementById('pause-screen').style.display = 'none';
                document.getElementById('speech-aniki').innerText = "よし、営業再開だ！";
                document.getElementById('speech-tako').innerText = "がんばるッチョ！";
            }
        }

        const anikiQuotes = ["青年部 城端支部の\n底力だ！", "曳山祭りの熱気に\n負けないぜ！", "むぎや祭りの哀愁…\nたまんねえよな！", "城端は本当に\nいい街だぞ！", "違う種類のたこ焼きは\nくっつかないぞ！", "指を離して\n落とすんだ！"];
        const takoQuotes = ["南砺市城端に\n遊びにきてッチョ！", "曳山祭りの庵唄、\n最高だッチョ〜！", "むぎや祭りで\n一緒に踊るッチョ！", "青年部のみんな、\nお疲れ様ッチョ！", "いい匂いが\nしてきたッチョ！", "狙いを定めて\n落とすッチョ！"];
        let chatInterval;

        function startChatter() {
            clearInterval(chatInterval);
            chatInterval = setInterval(() => {
                if(isStarted && !isGameOver && !isPaused && timeLeft > 30) {
                    document.getElementById('speech-aniki').innerText = anikiQuotes[Math.floor(Math.random() * anikiQuotes.length)];
                    document.getElementById('speech-tako').innerText = takoQuotes[Math.floor(Math.random() * takoQuotes.length)];
                }
            }, 6000);
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        
        function playSound(type) {
            initAudio();
            if(isMuted && type !== 'click') return; 
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.exponentialRampToValueAtTime(1600, now + 0.05);
                gainNode.gain.setValueAtTime(0.2, now); 
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'drop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'merge') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.linearRampToValueAtTime(880, now + 0.15);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(50, now + 0.5);
                gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.linearRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'jump') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(600, now);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.1); osc.frequency.linearRampToValueAtTime(2400, now + 0.3);
                gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        function setFaceMode(isOn) {
            playSound('click');
            isFaceEnabled = isOn;
            document.getElementById('btn-face-on').className = isOn ? 'face-btn active' : 'face-btn';
            document.getElementById('btn-face-off').className = !isOn ? 'face-btn active' : 'face-btn';
        }

        function openScoreScreen() { playSound('click'); document.getElementById('start-screen').style.display = 'none'; document.getElementById('score-screen').style.display = 'flex'; }
        function closeScoreScreen() { playSound('click'); document.getElementById('score-screen').style.display = 'none'; document.getElementById('start-screen').style.display = 'flex'; }

        function selectDiff(num) {
            playSound('click');
            requiredSelections = num;
            selectedTypes = [];
            if (num === 3) {
                selectedTypes = [0, 1, 2];
                startGame();
            } else {
                document.getElementById('diff-select').style.display = 'none';
                document.getElementById('type-select').style.display = 'block';
                document.getElementById('type-msg').innerText = `たこやき を ${num}こ\nえらんでね！`;
                updateTypeSelectionUI();
            }
        }

        function toggleTako(index) {
            playSound('click');
            const pos = selectedTypes.indexOf(index);
            if (pos > -1) { selectedTypes.splice(pos, 1); } 
            else {
                if (selectedTypes.length < requiredSelections) { selectedTypes.push(index); } 
                else { selectedTypes.shift(); selectedTypes.push(index); }
            }
            updateTypeSelectionUI();
        }

        function updateTypeSelectionUI() {
            for(let i=0; i<3; i++) {
                const el = document.getElementById(`tako-opt-${i}`);
                if (selectedTypes.includes(i)) el.classList.add('selected');
                else el.classList.remove('selected');
            }
            document.getElementById('start-btn').disabled = (selectedTypes.length !== requiredSelections);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            timeLeft = TOTAL_TIME;
            const timerEl = document.getElementById('timer-val');
            const timerContainer = document.getElementById('timer-container');
            timerEl.innerText = formatTime(timeLeft);
            timerContainer.style.color = '#2980b9'; timerContainer.style.borderColor = '#3498db';

            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                if (!isStarted || isGameOver || isPaused) return;
                timeLeft--;
                timerEl.innerText = formatTime(timeLeft);

                if (timeLeft === 60) {
                    document.getElementById('speech-aniki').innerText = "あと1分だ！\n急いで積むんだ！";
                    document.getElementById('speech-tako').innerText = "時間がなくなって\nきたッチョ！";
                } else if (timeLeft === 20) {
                    document.getElementById('speech-aniki').innerText = "もう時間がないぞ！\nラストスパートだ！";
                    document.getElementById('speech-tako').innerText = "ぎゃー！\nいそぐッチョー！";
                    timerContainer.style.color = '#c0392b'; timerContainer.style.borderColor = '#e74c3c';
                }

                if (timeLeft <= 0) { endGame('timeout'); }
            }, 1000);
        }

        function startGame() {
            playSound('click');
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.5; bgm.play().catch(e => console.log("BGM blocked"));

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('next-container').style.display = 'block';
            document.getElementById('timer-container').style.display = 'flex';
            document.getElementById('bottom-panel').style.display = 'flex';
            document.getElementById('touch-layer').style.display = 'block';
            
            document.getElementById('high-score-val').innerText = scores[requiredSelections].high;
            document.getElementById('prev-score-val').innerText = scores[requiredSelections].prev;

            Composite.clear(engine.world, false, true);
            createWalls();
            
            score = 0;
            updateScore(0);
            
            currentPiece = null;
            nextPiece = null;
            prepareNextPieces();
            
            isStarted = true;
            isGameOver = false;
            isPaused = false;
            canDrop = true;
            gameOverTimer = 0;
            
            document.getElementById('speech-aniki').innerText = "気合入れて\nたこ焼きつくるぞ！";
            document.getElementById('speech-tako').innerText = "いっくッチョー！";
            startChatter();
            startTimer();
        }

        function backToTitle() {
            playSound('click');
            if(isPaused) togglePause(); 
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
            document.getElementById('diff-select').style.display = 'block';
            document.getElementById('type-select').style.display = 'none';
            
            document.getElementById('next-container').style.display = 'none';
            document.getElementById('timer-container').style.display = 'none';
            document.getElementById('bottom-panel').style.display = 'none';
            document.getElementById('touch-layer').style.display = 'none';
            document.getElementById('player-piece-container').style.display = 'none';
            isStarted = false;
            
            updateScoreDisplay();
            Composite.clear(engine.world, false, true);
            createWalls();
        }

        function drawFace(ctx, radius, isBlinking, time, emotion, idOffset) {
            const eyeOffset = radius * 0.35;
            const eyeY = -radius * 0.15;
            const eyeSize = radius * 0.16; 
            const pupilSize = eyeSize * 0.6; 

            const pupilX = Math.sin(time * 0.003 + idOffset) * (eyeSize * 0.3);
            const pupilY = Math.cos(time * 0.002 + idOffset) * (eyeSize * 0.3);

            if (isBlinking) {
                ctx.fillStyle = '#4a2311';
                ctx.fillRect(-eyeOffset - eyeSize, eyeY, eyeSize*2, eyeSize*0.4);
                ctx.fillRect(eyeOffset - eyeSize, eyeY, eyeSize*2, eyeSize*0.4);
            } else {
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(-eyeOffset, eyeY, eyeSize, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(eyeOffset, eyeY, eyeSize, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.arc(-eyeOffset + pupilX, eyeY + pupilY, pupilSize, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(eyeOffset + pupilX, eyeY + pupilY, pupilSize, 0, Math.PI * 2); ctx.fill();
            }
            
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = Math.max(2.5, radius * 0.07);
            ctx.lineCap = 'round';
            ctx.beginPath();

            const mY = radius * 0.15;
            if (emotion === 'smile') {
                ctx.arc(0, mY, radius * 0.25, 0.1, Math.PI - 0.1, false);
            } else if (emotion === 'angry') {
                ctx.moveTo(-radius * 0.2, mY + radius*0.1);
                ctx.lineTo(0, mY - radius*0.05);
                ctx.lineTo(radius * 0.2, mY + radius*0.1);
            } else if (emotion === 'o') {
                ctx.arc(0, mY + radius*0.1, radius * 0.12, 0, Math.PI * 2);
            } else { 
                ctx.moveTo(-radius * 0.15, mY + radius*0.1);
                ctx.lineTo(radius * 0.15, mY + radius*0.1);
            }
            ctx.stroke();
        }

        function drawFaceOnPlayerPiece() {
            if (!currentPiece) return;
            const canvas = document.getElementById('player-face-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            const radius = canvas.width / 2;
            const time = Date.now();
            const blinkTimer = time % 4000;
            const isBlinking = blinkTimer < 150;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.translate(radius, radius); 
            
            ctx.drawImage(loadedImages[currentPiece.type], -radius, -radius, canvas.width, canvas.height);
            
            if (isFaceEnabled) {
                drawFace(ctx, radius, isBlinking, time, playerEmotion, 0);
            }
            
            if (isDragging || canDrop) {
                if(!isPaused) requestAnimationFrame(drawFaceOnPlayerPiece); 
            }
        }

        function getRandomPiece() {
            const randomType = selectedTypes[Math.floor(Math.random() * selectedTypes.length)];
            const randomLevel = Math.floor(Math.random() * 3); 
            return { type: randomType, level: randomLevel };
        }

        function prepareNextPieces() {
            if (!currentPiece) { currentPiece = getRandomPiece(); } 
            else { currentPiece = nextPiece; }
            nextPiece = getRandomPiece();
            
            const preview = document.getElementById('next-preview');
            preview.src = takoImages[nextPiece.type];
            document.getElementById('next-size').innerText = sizeLabels[nextPiece.level];

            playerX = width / 2; 
            const pContainer = document.getElementById('player-piece-container');
            const visualSize = sizes[currentPiece.level] * 2;
            pContainer.style.width = visualSize + 'px';
            pContainer.style.height = visualSize + 'px';
            pContainer.style.top = '40px'; 
            pContainer.style.display = 'block';
            
            playerEmotion = 'smile'; 
            updatePlayerPiecePosition();
            canDrop = true;
            
            drawFaceOnPlayerPiece();
        }

        function updatePlayerPiecePosition() {
            if (!currentPiece) return;
            const pContainer = document.getElementById('player-piece-container');
            const radius = sizes[currentPiece.level];
            playerX = Math.max(radius, Math.min(width - radius, playerX));
            pContainer.style.left = playerX + 'px';
        }

        const touchLayer = document.getElementById('touch-layer');
        function handlePointerMove(e) {
            if (!isStarted || isGameOver || !canDrop || isPaused) return;
            const rect = touchLayer.getBoundingClientRect();
            let clientX = e.clientX;
            if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; }
            playerX = clientX - rect.left;
            updatePlayerPiecePosition();
        }

        function handlePointerDown(e) {
            initAudio();
            if (!isStarted || isGameOver || !canDrop || isPaused) return;
            isDragging = true;
            playerEmotion = 'o'; 
            handlePointerMove(e);
        }

        function handlePointerUp(e) {
            if (!isStarted || isGameOver || !canDrop || !isDragging || isPaused) return;
            isDragging = false;
            canDrop = false; 
            
            document.getElementById('player-piece-container').style.display = 'none';
            playSound('drop');
            createTakoyaki(playerX, 40, currentPiece.type, currentPiece.level);

            setTimeout(() => {
                if (!isGameOver && !isPaused) { prepareNextPieces(); }
            }, 800);
        }

        touchLayer.addEventListener('mousedown', handlePointerDown);
        touchLayer.addEventListener('mousemove', (e) => { if (isDragging) handlePointerMove(e); });
        window.addEventListener('mouseup', handlePointerUp);

        touchLayer.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e); }, {passive: false});
        touchLayer.addEventListener('touchmove', (e) => { e.preventDefault(); if (isDragging) handlePointerMove(e); }, {passive: false});
        window.addEventListener('touchend', handlePointerUp);

        function getScoreMultiplier() {
            if (requiredSelections === 2) return 2; 
            if (requiredSelections === 3) return 3; 
            return 1; 
        }

        function createJumpingTako(x, y, bonusAmount) {
            const gameContainer = document.getElementById('game-container');
            const img = document.createElement('img');
            img.src = 'tako.png'; img.className = 'jumping-tako';
            img.style.left = x + 'px'; img.style.top = y + 'px';
            gameContainer.appendChild(img);

            const scoreEl = document.createElement('div');
            scoreEl.innerText = '+' + bonusAmount + '円'; 
            scoreEl.className = 'floating-score';
            scoreEl.style.left = x + 'px'; scoreEl.style.top = y + 'px'; 
            gameContainer.appendChild(scoreEl);

            setTimeout(() => {
                if(gameContainer.contains(img)) gameContainer.removeChild(img);
                if(gameContainer.contains(scoreEl)) gameContainer.removeChild(scoreEl);
            }, 2500);
        }

        function init() {
            engine = Engine.create();
            const matterCanvas = document.getElementById('matter-canvas');
            matterCanvas.width = width;
            matterCanvas.height = height;

            render = Render.create({
                canvas: matterCanvas,
                engine: engine,
                options: { width: width, height: height, wireframes: false, background: 'transparent' }
            });

            createWalls();
            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            Events.on(engine, 'beforeUpdate', () => {
                const bodies = Composite.allBodies(engine.world);
                bodies.forEach(body => {
                    if (body.label.startsWith('tako_') && body.squashX !== undefined) {
                        body.squashX += (1.0 - body.squashX) * 0.15;
                        body.squashY += (1.0 - body.squashY) * 0.15;
                    }
                });
            });

            Events.on(render, 'afterRender', () => {
                const ctx = render.context;
                const bodies = Composite.allBodies(engine.world);
                const time = Date.now();

                bodies.forEach(body => {
                    if (body.label.startsWith('tako_')) {
                        const parts = body.label.split('_'); 
                        const typeIndex = parseInt(parts[1]);
                        const isMax = parts[2] === '5';
                        const { x, y } = body.position;
                        const radius = body.circleRadius;
                        
                        ctx.translate(x, y);
                        ctx.rotate(body.angle);
                        ctx.scale(body.squashX || 1, body.squashY || 1); 
                        
                        const img = isMax ? maxTakoImg : loadedImages[typeIndex];
                        if(img.complete) {
                            ctx.drawImage(img, -radius, -radius, radius*2, radius*2);
                        }

                        if (!isMax && isFaceEnabled) {
                            const blinkTimer = (time + body.id * 150) % 4000;
                            const isBlinking = blinkTimer < 150;
                            
                            if (!body.emotionTimer || time > body.emotionTimer) {
                                const emotions = ['smile', 'angry', 'o', 'normal'];
                                body.emotion = emotions[Math.floor(Math.random() * emotions.length)];
                                body.emotionTimer = time + 2000 + Math.random() * 4000;
                            }
                            drawFace(ctx, radius, isBlinking, time, body.emotion, body.id);
                        }
                        
                        ctx.scale(1/(body.squashX || 1), 1/(body.squashY || 1));
                        ctx.rotate(-body.angle);
                        ctx.translate(-x, -y);
                    }
                });
            });

            Events.on(engine, 'collisionStart', (event) => {
                event.pairs.forEach((pair) => {
                    const { bodyA, bodyB } = pair;
                    
                    const impact = pair.collision.depth || 1;
                    if (bodyA.label.startsWith('tako_') && impact > 0.5) { bodyA.squashX = 1.15; bodyA.squashY = 0.85; }
                    if (bodyB.label.startsWith('tako_') && impact > 0.5) { bodyB.squashX = 1.15; bodyB.squashY = 0.85; }

                    if (bodyA.label === bodyB.label && bodyA.label.startsWith('tako_')) {
                        const parts = bodyA.label.split('_'); 
                        const typeIndex = parseInt(parts[1]);
                        const level = parseInt(parts[2]);

                        if (level < sizes.length - 1) {
                            const newX = (bodyA.position.x + bodyB.position.x) / 2;
                            const newY = (bodyA.position.y + bodyB.position.y) / 2;
                            Composite.remove(engine.world, [bodyA, bodyB]);
                            
                            const multi = getScoreMultiplier();

                            if (level + 1 === sizes.length - 1) {
                                const bonusAmount = 1000 * multi; 
                                createJumpingTako(newX, newY, bonusAmount);
                                playSound('jump');
                                updateScore(bonusAmount); 
                                document.getElementById('speech-tako').innerText = "やったッチョー！\n特大ボーナスだッチョ！";
                                document.getElementById('speech-aniki').innerText = "すげええ！！\nタコが飛び出したぞ！";
                            } else {
                                const newTako = createTakoyaki(newX, newY, typeIndex, level + 1);
                                newTako.squashX = 1.4; 
                                newTako.squashY = 0.6;
                                newTako.emotion = 'smile';
                                newTako.emotionTimer = Date.now() + 3000;
                                playSound('merge');
                                const baseScore = (level + 1) * 20;
                                updateScore(baseScore * multi);
                            }
                        }
                    }
                });
            });

            Events.on(engine, 'afterUpdate', () => {
                if (!isStarted || isGameOver || isPaused) return;
                
                let isLineOver = false;
                const bodies = Composite.allBodies(engine.world);
                bodies.forEach(body => {
                    if (!body.isStatic && body.label.startsWith('tako_')) {
                        if (body.position.y - body.circleRadius < gameOverLine && Math.abs(body.velocity.y) < 0.2 && Math.abs(body.velocity.x) < 0.2) {
                            isLineOver = true;
                        }
                    }
                });

                if (isLineOver) {
                    gameOverTimer++;
                    if (gameOverTimer > 60) { endGame('overflow'); }
                } else {
                    gameOverTimer = 0;
                }
            });
        }

        function createWalls() {
            const ground = Bodies.rectangle(width/2, height + 25, width, 50, { isStatic: true, render: { fillStyle: '#8b4513' } });
            const leftWall = Bodies.rectangle(-25, height/2, 50, height, { isStatic: true });
            const rightWall = Bodies.rectangle(width + 25, height/2, 50, height, { isStatic: true });
            Composite.add(engine.world, [ground, leftWall, rightWall]);
        }

        function createTakoyaki(x, y, typeIndex, level) {
            const hitboxRadius = sizes[level] * 0.8; 
            
            const tako = Bodies.circle(x, y, hitboxRadius, {
                label: `tako_${typeIndex}_${level}`, 
                circleRadius: hitboxRadius,
                restitution: 0.65, 
                friction: 0.1,    
                density: 0.001,
                render: { visible: false } 
            });
            
            tako.squashX = 1.0;
            tako.squashY = 1.0;
            tako.emotion = 'normal';
            tako.emotionTimer = 0;

            Composite.add(engine.world, tako);
            return tako;
        }

        function updateScore(points) {
            score += points;
            document.getElementById('score-val').innerText = score;
        }

        function endGame(reason) {
            isGameOver = true;
            canDrop = false;
            document.getElementById('touch-layer').style.display = 'none';
            document.getElementById('player-piece-container').style.display = 'none';

            clearInterval(chatInterval);
            clearInterval(countdownInterval);
            playSound('gameover');
            
            scores[requiredSelections].prev = score;
            localStorage.setItem(`takopazu_prev_${requiredSelections}`, score);
            if (score > scores[requiredSelections].high) {
                scores[requiredSelections].high = score;
                localStorage.setItem(`takopazu_high_${requiredSelections}`, score);
            }
            updateScoreDisplay();

            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = score; 
            
            if (reason === 'timeout') {
                document.getElementById('msg-title').innerText = '本日の営業終了！';
                document.getElementById('speech-aniki').innerText = "時間いっぱいだ！\nよく頑張ったな！";
                document.getElementById('speech-tako').innerText = "おつかれッチョ！\n大繁盛だッチョ！";
            } else {
                document.getElementById('msg-title').innerText = 'ゲームオーバー';
                document.getElementById('speech-aniki').innerText = "よく積んだな！\n次も頼むぞ！";
                document.getElementById('speech-tako').innerText = "あちゃー！\nまた挑戦するッチョ！";
            }
        }

        init();
    </script>
