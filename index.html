<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兄貴のたこやきパズル！</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
            font-family: 'M PLUS Rounded 1c', sans-serif; 
            /* ご指定のpng画像に変更しました */
            background-image: url('aka_haikei.png');
            background-size: 400px;
            animation: bg-scroll 15s linear infinite;
        }

        @keyframes bg-scroll { 
            0% { background-position: 0 0; } 
            100% { background-position: 400px 400px; } 
        }

        /* 可愛いミュートボタン */
        #mute-btn {
            position: absolute;
            top: 20px; left: 20px;
            background: #fff; border: 4px solid #ff9ff3; border-radius: 50%;
            width: 65px; height: 65px; cursor: pointer; z-index: 1000;
            box-shadow: 0 5px 0 #ff9ff3; 
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        #mute-btn:active { transform: translateY(5px); box-shadow: none; }
        .icon-svg { width: 35px; height: 35px; stroke: #e15f41; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        #main-wrapper { display: flex; align-items: flex-end; gap: 20px; z-index: 10; }

        /* キャラクターと吹き出し */
        .character-container { display: flex; flex-direction: column; align-items: center; position: relative; padding-bottom: 20px; }
        .speech-bubble {
            background: #fff; border-radius: 15px; padding: 10px 15px; font-size: 16px; color: #d35400;
            border: 4px solid #e15f41; margin-bottom: 15px; text-align: center; width: 180px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); position: relative; white-space: pre-line; line-height: 1.4;
            min-height: 45px; display: flex; align-items: center; justify-content: center; z-index: 3;
        }
        .speech-bubble::after { content: ''; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); border-width: 12px 12px 0; border-style: solid; border-color: #e15f41 transparent transparent transparent; }
        .speech-bubble::before { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-width: 8px 8px 0; border-style: solid; border-color: #fff transparent transparent transparent; z-index: 1; }

        /* キャラクター画像 */
        .character { width: 200px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3)); z-index: 2; }
        .char-aniki { animation: float-aniki 2s ease-in-out infinite alternate; }
        @keyframes float-aniki { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }
        
        .char-tako { animation: float-tako 2s ease-in-out infinite alternate 0.5s; }
        @keyframes float-tako { 0% { transform: scaleX(-1) translateY(0); } 100% { transform: scaleX(-1) translateY(-15px); } }

        /* タコの頭上のロゴ */
        #tako-logo {
            width: 140px; margin-bottom: -10px;
            animation: sway 2s ease-in-out infinite alternate; z-index: 4;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.2));
        }
        @keyframes sway { 0% { transform: rotate(-8deg); } 100% { transform: rotate(8deg); } }

        /* ゲーム画面 */
        #game-container { 
            position: relative; background-color: #fff9e6; border-radius: 10px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 8px solid #8b4513; touch-action: none; 
        }
        
        /* プレイエリアの背景ロゴ（透かし） */
        #game-container::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; height: 85%;
            background-image: url('aniki_logo.png');
            background-size: contain; background-position: center; background-repeat: no-repeat;
            opacity: 0.15; pointer-events: none; z-index: 0;
        }

        /* ゲームオーバーの限界線（追加） */
        #danger-line {
            position: absolute; top: 120px; left: 0; width: 100%;
            border-top: 3px dashed rgba(225, 95, 65, 0.6);
            z-index: 2; pointer-events: none;
        }

        canvas { display: block; position: relative; z-index: 1; }
        
        /* UI要素 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #stats-container { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 5px; }
        .score-box { background: rgba(255,255,255,0.9); padding: 5px 12px; border-radius: 15px; border: 3px solid #e15f41; box-shadow: 0 3px 0 #e15f41; font-size: 14px; color: #e15f41; font-weight: bold; }
        #current-score-box { background: #e15f41; color: #fff; border-color: #fff; box-shadow: 0 4px 0 #c44536; font-size: 24px; text-shadow: 1px 1px 0 #c44536; padding: 5px 15px; }
        
        #next-container { position: absolute; top: 10px; right: 10px; text-align: center; background: rgba(255,255,255,0.95); padding: 8px 12px; border-radius: 15px; border: 3px solid #e15f41; box-shadow: 0 4px 0 #e15f41; }
        #next-label { font-size: 16px; color: #e15f41; margin-bottom: 2px; font-weight: bold; }
        #next-preview { width: 45px; height: 45px; object-fit: contain; }
        #next-size { font-size: 13px; color: #d35400; font-weight: bold; margin-top: 5px; }

        /* スタート・ゲームオーバー画面 */
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,249,230,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; pointer-events: auto; }
        .overlay-screen h1 { color: #fff; text-shadow: 3px 3px 0 #e15f41, -3px -3px 0 #e15f41, 3px -3px 0 #e15f41, -3px 3px 0 #e15f41; margin-bottom: 20px; font-size: 40px; text-align: center;}
        
        .action-btn { background: #fff; color: #e15f41; padding: 12px 25px; border-radius: 30px; font-size: 20px; border: 4px solid #e15f41; box-shadow: 0 5px 0 #e15f41; cursor: pointer; margin: 10px; font-family: 'M PLUS Rounded 1c', sans-serif; font-weight: bold; transition: transform 0.1s; }
        .action-btn:active { transform: translateY(5px); box-shadow: none; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .tako-selector { display: flex; gap: 15px; margin: 20px 0; }
        .tako-option { width: 80px; height: 80px; border-radius: 50%; border: 5px solid transparent; cursor: pointer; transition: all 0.2s; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tako-option.selected { border-color: #e15f41; background: #ffeaa7; transform: scale(1.1); box-shadow: 0 0 15px #e15f41; }
        .instruction { font-size: 18px; color: #d35400; font-weight: bold; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <audio id="bgm" src="song_anitako.mp3" loop></audio>
    
    <button id="mute-btn" onclick="toggleMute()">
        <svg id="icon-sound-on" class="icon-svg" viewBox="0 0 24 24">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
        <svg id="icon-sound-off" class="icon-svg" viewBox="0 0 24 24" style="display: none; stroke: #ccc;">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="23" y1="1" x2="1" y2="23"></line>
        </svg>
    </button>

    <div id="main-wrapper">
        <div class="character-container">
            <div class="speech-bubble" id="speech-aniki">気合入れて<br>たこ焼きつくるぞ！</div>
            <img src="aniki_kamae.png" alt="お兄さん" class="character char-aniki">
        </div>

        <div id="game-container">
            <div id="danger-line"></div>

            <div id="start-screen" class="overlay-screen">
                <img src="aniki_logo.png" alt="兄貴のたこやき" style="width: 250px; margin-bottom: 10px;">
                <div id="diff-select">
                    <div class="instruction">なんいど を えらんでね！</div>
                    <button class="action-btn" onclick="selectDiff(1)">かんたん（1しゅるい）</button><br>
                    <button class="action-btn" onclick="selectDiff(2)">ふつう（2しゅるい）</button><br>
                    <button class="action-btn" onclick="selectDiff(3)">むずい（3つぜんぶ）</button>
                </div>
                <div id="type-select" style="display:none;">
                    <div class="instruction" id="type-msg">たこやき を えらんでね！</div>
                    <div class="tako-selector">
                        <img src="2_takoyaki.png" class="tako-option" id="tako-opt-0" onclick="toggleTako(0)">
                        <img src="3_takoyaki.png" class="tako-option" id="tako-opt-1" onclick="toggleTako(1)">
                        <img src="4_takoyaki.png" class="tako-option" id="tako-opt-2" onclick="toggleTako(2)">
                    </div>
                    <button class="action-btn" id="start-btn" onclick="startGame()" disabled>スタート！</button>
                </div>
            </div>

            <div id="game-over-screen" class="overlay-screen" style="display:none;">
                <h1>ゲームオーバー</h1>
                <button class="action-btn" onclick="backToTitle()">タイトルへもどる</button>
            </div>

            <div id="ui-layer">
                <div id="stats-container">
                    <div class="score-box">さいこう: <span id="high-score-val">0</span></div>
                    <div class="score-box">ぜんかい: <span id="prev-score-val">0</span></div>
                    <div class="score-box" id="current-score-box">スコア: <span id="score-val">0</span></div>
                </div>
                <div id="next-container" style="display:none;">
                    <div id="next-label">つぎ</div>
                    <img id="next-preview" src="" alt="次">
                    <div id="next-size">ふつう</div>
                </div>
            </div>
        </div>

        <div class="character-container">
            <img src="aniki_logo.png" id="tako-logo" alt="ロゴ">
            <div class="speech-bubble" id="speech-tako">タッチで<br>スタートだッチョ！</div>
            <img src="tako.png" alt="たこ" class="character char-tako">
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

        const width = 400;
        const height = 600;
        const gameOverLine = 120;
        let engine, render, runner;
        let isGameOver = false;
        let isStarted = false;
        let score = 0;
        let canDrop = true;
        
        // バグ修正用：ゲームオーバーを判定するためのタイマー
        let gameOverTimer = 0;

        const takoImages = ['2_takoyaki.png', '3_takoyaki.png', '4_takoyaki.png'];
        const sizeLabels = ['ちいさめ', 'ふつう', 'おおきめ'];
        let requiredSelections = 1;
        let selectedTypes = []; 
        let nextPiece = { type: 0, level: 0 };

        let highScore = localStorage.getItem('takopazu_high') || 0;
        let prevScore = localStorage.getItem('takopazu_prev') || 0;
        document.getElementById('high-score-val').innerText = highScore;
        document.getElementById('prev-score-val').innerText = prevScore;

        const imageBaseSize = 400; 
        const sizes = [20, 30, 45, 65, 90, 120];

        // ミュートボタンの切り替え処理
        let isMuted = false;
        function toggleMute() {
            const bgm = document.getElementById('bgm');
            isMuted = !isMuted;
            bgm.muted = isMuted;
            document.getElementById('icon-sound-on').style.display = isMuted ? 'none' : 'block';
            document.getElementById('icon-sound-off').style.display = isMuted ? 'block' : 'none';
        }

        const anikiQuotes = [
            "南砺市商工会青年部\n城端支部の底力だ！", "城端曳山祭りの熱気に\n負けないぜ！", "むぎや祭りの哀愁…\nたまんねえよな！",
            "城端は本当に\nいい街だぞ！", "兄貴のたこやき、\n今日も絶好調！", "違う種類のたこ焼きは\nくっつかないぞ！", "いいぞ！\nその調子だ！"
        ];
        const takoQuotes = [
            "南砺市城端に\n遊びにきてッチョ！", "城端曳山祭りの庵唄、\n最高だッチョ〜！", "城端むぎや祭りで\n一緒に踊るッチョ！",
            "青年部のみんな、\nいつもお疲れ様ッチョ！", "たこ焼きのいい匂いが\nしてきたッチョ！", "おおきくなってきた\nッチョ〜！", "焦らずじっくり\n積むッチョ！"
        ];
        let chatInterval;

        function startChatter() {
            clearInterval(chatInterval);
            chatInterval = setInterval(() => {
                if(isStarted && !isGameOver) {
                    document.getElementById('speech-aniki').innerText = anikiQuotes[Math.floor(Math.random() * anikiQuotes.length)];
                    document.getElementById('speech-tako').innerText = takoQuotes[Math.floor(Math.random() * takoQuotes.length)];
                }
            }, 6000);
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'drop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'merge') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.linearRampToValueAtTime(880, now + 0.15);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(50, now + 0.5);
                gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.linearRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }

        function selectDiff(num) {
            initAudio(); 
            requiredSelections = num;
            selectedTypes = [];
            if (num === 3) {
                selectedTypes = [0, 1, 2];
                startGame();
            } else {
                document.getElementById('diff-select').style.display = 'none';
                document.getElementById('type-select').style.display = 'block';
                document.getElementById('type-msg').innerText = `たこやき を ${num}こ\nえらんでね！`;
                updateTypeSelectionUI();
            }
        }

        function toggleTako(index) {
            initAudio();
            const pos = selectedTypes.indexOf(index);
            if (pos > -1) {
                selectedTypes.splice(pos, 1);
            } else {
                if (selectedTypes.length < requiredSelections) {
                    selectedTypes.push(index);
                } else {
                    selectedTypes.shift();
                    selectedTypes.push(index);
                }
            }
            updateTypeSelectionUI();
        }

        function updateTypeSelectionUI() {
            for(let i=0; i<3; i++) {
                const el = document.getElementById(`tako-opt-${i}`);
                if (selectedTypes.includes(i)) el.classList.add('selected');
                else el.classList.remove('selected');
            }
            document.getElementById('start-btn').disabled = (selectedTypes.length !== requiredSelections);
        }

        function startGame() {
            initAudio();
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.5;
            bgm.play().catch(e => console.log("BGMの自動再生がブロックされました"));

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('next-container').style.display = 'block';
            
            Composite.clear(engine.world, false, true);
            createWalls();
            
            score = 0;
            updateScore(0);
            updateNextPreview();
            
            isStarted = true;
            isGameOver = false;
            canDrop = true;
            gameOverTimer = 0; // タイマーリセット
            
            document.getElementById('speech-aniki').innerText = "気合入れて\nたこ焼きつくるぞ！";
            document.getElementById('speech-tako').innerText = "いっくッチョー！";
            startChatter();
        }

        function backToTitle() {
            initAudio();
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
            document.getElementById('diff-select').style.display = 'block';
            document.getElementById('type-select').style.display = 'none';
            document.getElementById('next-container').style.display = 'none';
            isStarted = false;
            
            document.getElementById('high-score-val').innerText = highScore;
            document.getElementById('prev-score-val').innerText = prevScore;
            
            Composite.clear(engine.world, false, true);
            createWalls();
        }

        function init() {
            engine = Engine.create();
            render = Render.create({
                element: document.getElementById('game-container'),
                engine: engine,
                options: { width: width, height: height, wireframes: false, background: 'transparent' }
            });

            createWalls();
            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            Events.on(engine, 'collisionStart', (event) => {
                event.pairs.forEach((pair) => {
                    const { bodyA, bodyB } = pair;
                    if (bodyA.label === bodyB.label && bodyA.label.startsWith('tako_')) {
                        const parts = bodyA.label.split('_'); 
                        const typeIndex = parseInt(parts[1]);
                        const level = parseInt(parts[2]);

                        if (level < sizes.length - 1) {
                            const newX = (bodyA.position.x + bodyB.position.x) / 2;
                            const newY = (bodyA.position.y + bodyB.position.y) / 2;
                            Composite.remove(engine.world, [bodyA, bodyB]);
                            createTakoyaki(newX, newY, typeIndex, level + 1);
                            playSound('merge');
                            updateScore((level + 1) * 20);
                        }
                    }
                });
            });

            // ★バグ修正部分：ゲームオーバーの厳密な判定★
            Events.on(engine, 'afterUpdate', () => {
                if (!isStarted || isGameOver) return;
                
                let isLineOver = false;
                const bodies = Composite.allBodies(engine.world);
                
                bodies.forEach(body => {
                    // 壁以外の「たこ焼き」が対象
                    if (!body.isStatic && body.label.startsWith('tako_')) {
                        // オブジェクトの上端（位置 - 半径）がラインを越えていて、かつ静止している場合
                        if (body.position.y - body.circleRadius < gameOverLine && 
                            Math.abs(body.velocity.y) < 0.2 && 
                            Math.abs(body.velocity.x) < 0.2) {
                            isLineOver = true;
                        }
                    }
                });

                // ライン越えで静止している状態が約1秒（60フレーム）続いたらゲームオーバー
                if (isLineOver) {
                    gameOverTimer++;
                    if (gameOverTimer > 60) {
                        endGame();
                    }
                } else {
                    gameOverTimer = 0; // 解消されたらタイマーをリセット
                }
            });
        }

        function createWalls() {
            const ground = Bodies.rectangle(width/2, height + 25, width, 50, { isStatic: true, render: { fillStyle: '#8b4513' } });
            const leftWall = Bodies.rectangle(-25, height/2, 50, height, { isStatic: true });
            const rightWall = Bodies.rectangle(width + 25, height/2, 50, height, { isStatic: true });
            Composite.add(engine.world, [ground, leftWall, rightWall]);
        }

        function createTakoyaki(x, y, typeIndex, level) {
            const visualRadius = sizes[level];
            const hitboxRadius = visualRadius * 0.8; 
            const scale = (visualRadius * 2) / imageBaseSize; 
            
            const tako = Bodies.circle(x, y, hitboxRadius, {
                label: `tako_${typeIndex}_${level}`, 
                circleRadius: hitboxRadius, // 判定用に半径を保存
                restitution: 0.1, friction: 0.8,
                render: { sprite: { texture: takoImages[typeIndex], xScale: scale, yScale: scale } }
            });
            Composite.add(engine.world, tako);
        }

        function updateScore(points) {
            score += points;
            document.getElementById('score-val').innerText = score;
        }

        function updateNextPreview() {
            const randomType = selectedTypes[Math.floor(Math.random() * selectedTypes.length)];
            const randomLevel = Math.floor(Math.random() * 3); 
            nextPiece = { type: randomType, level: randomLevel };
            
            const preview = document.getElementById('next-preview');
            preview.src = takoImages[randomType];
            preview.style.width = (sizes[randomLevel] * 1.5) + 'px';
            preview.style.height = (sizes[randomLevel] * 1.5) + 'px';
            
            document.getElementById('next-size').innerText = sizeLabels[randomLevel];
        }

        function endGame() {
            isGameOver = true;
            clearInterval(chatInterval);
            playSound('gameover');
            
            localStorage.setItem('takopazu_prev', score);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('takopazu_high', highScore);
            }

            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('speech-aniki').innerText = "よく積んだな！\n次も頼むぞ！";
            document.getElementById('speech-tako').innerText = "あちゃー！\nまた挑戦するッチョ！";
        }

        document.getElementById('game-container').addEventListener('pointerdown', (e) => {
            initAudio();
            if (!isStarted || isGameOver || !canDrop) return;
            
            if (document.getElementById('start-screen').style.display !== 'none' || 
                document.getElementById('game-over-screen').style.display !== 'none') return;

            const rect = document.getElementById('game-container').getBoundingClientRect();
            const x = e.clientX - rect.left;
            
            if (x > 0 && x < width) {
                canDrop = false;
                playSound('drop');
                createTakoyaki(x, 40, nextPiece.type, nextPiece.level);
                updateNextPreview();

                setTimeout(() => { canDrop = true; }, 600);
            }
        });

        init();
    </script>
</body>
</html>
